<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Cat's Arcade</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<!-- LOCK SCREEN -->

<div id="lockScreen">

<h2>🔒 Enter Passcode</h2>

<input
type="password"
id="passInput"
placeholder="Enter passcode"
>

<br><br>

<button onclick="checkPass()">Enter</button>

<p id="error"></p>

</div>

<header>

<h1>Cat's Arcade</h1>

<input
id="search"
type="text"
placeholder="Search games..."
onkeyup="searchGames()"
>

<br><br>

<button class="random-btn" onclick="randomGame()">
🎲 Random Game
</button>

</header>

<!-- GAME GRID -->

<section class="games" id="gameGrid"></section>

<footer>
Cat's Arcade • Free Browser Games
</footer>

<script src="js/app.js"></script>

</body>
</html>
