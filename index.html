<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cat's Arcade</title>

<style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#0f0f0f;
    color:white;
    text-align:center;
}

header{
    padding:30px;
    background:#111;
    border-bottom:3px solid #222;
}

h1{
    margin-top:10px;
    font-size:40px;
}

.logo{
    width:120px;
    margin:auto;
}

/* search */

#search{
    padding:10px;
    width:250px;
    border-radius:8px;
    border:none;
    margin-top:15px;
}

/* random button */

.random-btn{
    padding:10px 20px;
    border:none;
    border-radius:8px;
    background:#00ff9c;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
}

/* arcade grid */

.games{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    padding:40px;
}

.card{
    background:#1a1a1a;
    padding:20px;
    border-radius:12px;
    width:160px;
    transition:0.2s;
}

.card:hover{
    transform:scale(1.05);
    background:#222;
}

.card a{
    color:white;
    text-decoration:none;
    font-size:18px;
}

footer{
    padding:20px;
    color:#777;
}

</style>
</head>

<body>

<header>

<div class="logo">

<svg viewBox="0 0 200 120">

<rect x="0" y="80" width="200" height="10" fill="#555"/>
<rect x="10" y="60" width="10" height="30" fill="#555"/>
<rect x="40" y="60" width="10" height="30" fill="#555"/>
<rect x="70" y="60" width="10" height="30" fill="#555"/>
<rect x="100" y="60" width="10" height="30" fill="#555"/>
<rect x="130" y="60" width="10" height="30" fill="#555"/>
<rect x="160" y="60" width="10" height="30" fill="#555"/>

<g>
<ellipse cx="90" cy="50" rx="25" ry="15" fill="black"/>
<circle cx="115" cy="45" r="10" fill="black"/>

<polygon points="108,35 112,25 116,35" fill="black"/>
<polygon points="118,35 122,25 126,35" fill="black"/>

<path d="M65 50 Q50 30 70 20" stroke="black" stroke-width="6" fill="none"/>
</g>

</svg>

</div>

<h1>Cat's Arcade</h1>

<input
id="search"
type="text"
placeholder="Search games..."
onkeyup="searchGames()"
>

<br><br>

<button class="random-btn" onclick="randomGame()">
🎲 Random Game
</button>

</header>

<!-- GAME GRID (JS FILLS THIS) -->

<section class="games" id="gameGrid"></section>

<footer>
Cat's Arcade • Free Browser Games
</footer>

<script src="app.js"></script>

</body>
</html>
